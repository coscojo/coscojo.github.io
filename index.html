<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corey S. Johnsen</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">Corey S. Johnsen</header>

  <main class="stage">
    <div class="panels">
      <div class="panel film">
        <img class="panel-icon" src="images/active/dashboard/movies-and-tv-svgrepo-com.svg" alt="Film">
        <span>Film</span>
      </div>
      <div class="panel writing">
        <img class="panel-icon" src="images/active/dashboard/writing-with-a-feather-on-a-book-svgrepo-com.svg" alt="Writing">
        <span>Writing</span>
      </div>
      <div class="panel art">
        <img class="panel-icon" src="images/active/dashboard/art-design-paint-pallet-format-text-svgrepo-com.svg" alt="Art">
        <span>Art</span>
      </div>
      <div class="panel projects">
        <img class="panel-icon" src="images/active/dashboard/code-svgrepo-com.svg" alt="Projects">
        <span>Projects</span>
      </div>
    </div>

    <div class="hover-panel" id="hoverPanel">
      <div class="hover-panel-content" id="hoverFooter">Hover a panel</div>
    </div>
  </main>

  <footer class="footer">© Corey S. Johnsen</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
